<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>임기창 — 취업 서류</title>
  <style>
    :root {
      --bg: #F2F2F0;
      --page: #FFFFFF;
      --t1: #0F0F0F;
      --t2: #4B5563;
      --t3: #9CA3AF;
      --accent: #3730A3;
      --accent-soft: #EEF2FF;
      --accent-border: #C7D2FE;
      --border: #E5E7EB;
      --green: #065F46;
      --green-bg: #D1FAE5;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--t1);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      width: 100%;
      max-width: 540px;
    }
    .header {
      text-align: center;
      margin-bottom: 36px;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--t3);
      text-decoration: none;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--t2); }
    .name { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: var(--t2); }

    .cards { display: flex; flex-direction: column; gap: 12px; }
    .card {
      display: flex;
      align-items: center;
      gap: 18px;
      background: var(--page);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .card:hover {
      border-color: var(--accent-border);
      box-shadow: 0 4px 20px rgba(55,48,163,0.1);
      transform: translateY(-2px);
    }
    .card-icon {
      width: 46px; height: 46px;
      border-radius: 10px;
      background: var(--accent-soft);
      border: 1px solid var(--accent-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .card-body { flex: 1; }
    .card-title { font-size: 14.5px; font-weight: 700; margin-bottom: 3px; }
    .card-desc { font-size: 12px; color: var(--t3); line-height: 1.5; }
    .card-arrow { font-size: 16px; color: var(--t3); flex-shrink: 0; }
    .card:hover .card-arrow { color: var(--accent); }

    .tip {
      margin-top: 28px;
      background: var(--green-bg);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 11.5px;
      color: var(--green);
      line-height: 1.6;
      text-align: center;
    }
    .tip strong { font-weight: 700; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="../portfolio/" class="back-link">← 포트폴리오로 돌아가기</a>
      <div class="name">임기창</div>
      <div class="subtitle">취업 서류 모음 · Ctrl+P 또는 인쇄 버튼으로 PDF 저장</div>
    </div>

    <div class="cards">
      <a href="이력서.html" class="card">
        <div class="card-icon">📄</div>
        <div class="card-body">
          <div class="card-title">이력서</div>
          <div class="card-desc">사진·성과 하이라이트·경력 요약 — 채용 담당자용 1장 개요</div>
        </div>
        <span class="card-arrow">›</span>
      </a>

      <a href="경력기술서.html" class="card">
        <div class="card-icon">📋</div>
        <div class="card-body">
          <div class="card-title">경력기술서</div>
          <div class="card-desc">프로젝트별 기술 상세·문제해결·성과 — 기술 면접관용 상세 문서</div>
        </div>
        <span class="card-arrow">›</span>
      </a>

      <a href="자기소개서.html" class="card">
        <div class="card-icon">✍️</div>
        <div class="card-body">
          <div class="card-title">자기소개서</div>
          <div class="card-desc">성장과정·직무경험·지원동기 — 회사 유형별 커스터마이징 가이드 포함</div>
        </div>
        <span class="card-arrow">›</span>
      </a>
    </div>

    <div class="tip">
      <strong>PDF 저장 방법</strong> &nbsp;—&nbsp; 각 문서 열기 후 <strong>Ctrl + P</strong> (또는 Cmd + P) →
      대상: <strong>PDF로 저장</strong> → 배경 그래픽 체크 후 인쇄
    </div>
  </div>
</body>
</html>
