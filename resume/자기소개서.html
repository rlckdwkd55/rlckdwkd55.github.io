<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>임기창 자기소개서</title>
  <style>
    :root {
      --bg: #F2F2F0;
      --page: #FFFFFF;
      --t1: #0F0F0F;
      --t2: #4B5563;
      --t3: #9CA3AF;
      --accent: #3730A3;
      --accent-soft: #EEF2FF;
      --accent-text: #3730A3;
      --border: #E5E7EB;
      --warn-bg: #FFFBEB;
      --warn-text: #92400E;
      --warn-border: #FDE68A;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--t1);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", system-ui, sans-serif;
      font-size: 13.5px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      max-width: 800px;
      margin: 40px auto;
      background: var(--page);
      border-radius: 4px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .header { padding: 44px 52px 36px; border-bottom: 1px solid var(--border); }
    .name { font-size: 2.1rem; font-weight: 800; letter-spacing: -0.04em; line-height: 1; }
    .doc-type { margin-top: 6px; font-size: 0.95rem; color: var(--t2); }
    .body { padding: 0 52px 52px; }
    .section { padding-top: 36px; }
    .section-label {
      font-size: 11px; font-weight: 800;
      color: var(--t1);
      border-bottom: 1.5px solid var(--t1);
      padding-bottom: 6px;
      margin-bottom: 16px;
      letter-spacing: 0.01em;
    }
    .section-title { font-size: 15px; font-weight: 800; color: var(--t1); margin-bottom: 12px; }
    .prose { font-size: 13px; color: var(--t2); line-height: 1.85; }
    .prose strong { color: var(--t1); font-weight: 600; }
    .prose p + p { margin-top: 10px; }
    /* Guide block */
    .guide {
      border-left: 2px solid var(--border);
      padding: 4px 14px;
      font-size: 12px;
      color: var(--t3);
      line-height: 1.7;
      margin-bottom: 16px;
    }
    .guide strong { font-weight: 700; color: var(--t2); }
    /* Table */
    .table-wrap { overflow-x: auto; margin-top: 14px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th {
      background: var(--bg); color: var(--t2); font-weight: 600; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border);
    }
    td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--t2); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    td:first-child { white-space: nowrap; }
    /* Template */
    .template-block {
      border-left: 2px solid var(--border);
      padding: 8px 14px;
      font-size: 12px;
      color: var(--t2);
      line-height: 1.8;
      margin-top: 14px;
      font-style: italic;
    }
    @media print {
      body { background: white; }
      .page { margin: 0; border: none; border-radius: 0; box-shadow: none; max-width: 100%; }
      .guide { display: none; }
    }
  </style>
</head>
<body>
<script>
/* ================================================================
   ▼▼▼  이직 시 이 데이터만 수정하세요  ▼▼▼
   ================================================================ */
const DATA = {
  name: "임기창",
  docType: "자기소개서 · 템플릿",
  sections: [
    {
      id: "growth",
      label: "Section 01",
      title: "성장 과정 및 개발자로서의 여정",
      paragraphs: [
        `반복적이고 수동적인 업무에서 효율을 개선할 방법을 고민하다 자동화의 가치를 느껴 개발을 시작했습니다. 간단한 웹 애플리케이션 개발에서 출발해 공공 SI 시스템 유지보수와 대규모 크롤링 및 자동화 시스템 구축을 거쳐, 현재는 엔터프라이즈 검색 엔진과 멀티에이전트 AI 챗봇까지 다루는 풀스택 개발자로 성장했습니다.`,
        `점차 더 복잡하고 확장성이 요구되는 시스템으로 영역을 넓혀 오면서, 기능 구현 그 자체보다 <strong>효율적이고 유지보수 가능한 구조를 설계하는 일의 중요성</strong>을 일관되게 중시해 왔습니다.`,
      ],
    },
    {
      id: "experience",
      label: "Section 02",
      title: "직무 경험 및 핵심 역량",
      paragraphs: [
        `현재 웨어비즈에서는 멀티에이전트 RAG 챗봇 플랫폼(Argos AI Chat Search)을 <strong>초기 멤버 2인</strong> 중 한 명으로 처음부터 함께 개발하며 제품의 핵심 구조를 직접 설계하고 구현하고 있습니다. LangGraph로 Supervisor 아키텍처 기반 멀티에이전트를 구성하고, Qdrant 벡터 검색에 CrossEncoder 리랭킹을 결합한 파이프라인과 유사도 임계값 초과 시 즉시 응답하는 시나리오 에이전트를 구현했습니다.`,
        `FastAPI·SQLAlchemy 기반 멀티테넌트 관리자 API부터 Next.js·Zustand 기반 관리자 대시보드·챗봇 위젯, NVIDIA GPU 서버 Docker 배포까지 백엔드와 프론트엔드 전 영역을 담당하며, 기획부터 배포와 인증까지 제품의 전체 생애주기를 경험했습니다. 이 제품은 <strong>GS 1등급 인증 취득(TTA, 2026.06)·저작권 등록(2026.03)을 완료해 실제 고객사에 납품</strong>되었습니다.`,
        `함께 운영하는 Elasticsearch 기반 엔터프라이즈 검색 엔진(ArgosSearch)에서는 자동완성·연관검색어·오타교정·동의어 처리 등 검색 핵심 기능과 다중 외부 DB 연동, Apache Tika 문서 파싱 파이프라인의 유지보수와 기능 개선을 담당하며 검색 도메인에 대한 이해를 넓혔습니다.`,
        `이전 케니컴퍼니에서는 700개 이상 사이트를 대상으로 일 3,000건 규모의 대규모 크롤링 시스템과 FCM 연동 자동 알림 서비스를 구축했고, 전자정부프레임워크 기반 공공 시스템(GBMS, 버스파인) 유지보수와 SXSSFWorkbook 기반 대용량 엑셀 다운로드 기능 개발 등을 담당하며 백엔드 기초와 대용량 데이터 처리 역량을 다졌습니다.`,
      ],
    },
    {
      id: "problem",
      label: "Section 03",
      title: "문제 해결 및 협업 경험",
      paragraphs: [
        `AI 챗봇을 개발하며 LLM 특유의 문제들을 직접 다뤘습니다. 검색된 문서에 없는 내용을 답변에 지어내는 할루시네이션은 LLM 기반 Document Grading과 Terminology Validation 2단계 검증으로 억제했고, 멀티턴 대화에서 토큰 사용량이 늘어나는 문제는 일정 대화 수를 넘어가면 이전 대화를 요약 프롬프트로 압축해 맥락은 유지하면서 토큰을 절약하는 방식으로 해결했습니다.`,
        `검색 엔진 운영에서는 장애 원인을 끝까지 추적해 해결하는 경험을 쌓았습니다. Tibero를 사용하는 고객사에서 색인 스케줄러가 간헐적으로 중단되는 현상이 있었는데, DB 커넥션 풀이 모두 점유되어 발생한 문제임을 확인하고 설정을 조정해 해결했습니다. 또한 HTTP 본문 크기가 100MB를 초과해 일부 데이터가 색인되지 않던 문제는 Elasticsearch의 <code>http.max_content_length</code> 값을 상향 조정해 정상적으로 색인되도록 처리했습니다.`,
        `이전 크롤링 시스템 개발에서도 수집 중 발생한 CORS 차단 문제를 Proxy 서버 구조로 개선해 안정적인 수집 환경을 확보했습니다. 이처럼 성격이 다른 문제들을 다뤄오면서, 팀과의 적극적인 커뮤니케이션과 코드 리뷰, 주기적인 회고를 통해 품질을 꾸준히 개선하는 협업 방식을 중요하게 여겨 왔습니다.`,
      ],
    },
    {
      id: "goal",
      label: "Section 04",
      title: "성장 목표",
      paragraphs: [
        `단순한 기능 구현을 넘어, 운영 효율성과 유지보수성, 확장성을 고려한 시스템을 설계하는 개발자를 지향합니다. 기초를 탄탄히 다지면서도 새로운 기술을 유연하게 받아들이고, 문제 상황을 능동적으로 분석하고 해결하는 역량을 꾸준히 키워가고 있습니다. 앞으로도 사용자에게 실질적인 가치를 제공하는 서비스를 만들고, 팀과 제품의 성장을 함께 도모하는 개발자로 나아가겠습니다.`,
      ],
    },
  ],
  motivation: {
    label: "Section 05",
    title: "지원 동기 (지원 시마다 새로 작성)",
    guide: "아래는 작성 가이드입니다. 지원 시마다 회사에 맞게 새로 작성하세요. 공통 자기소개서는 합격률이 낮습니다.",
    columns: ["지원 회사 유형", "강조할 경험"],
    rows: [
      { type: "AI 스타트업", point: "LangGraph·Qdrant·RAG 파이프라인, 초기 2인 멤버 경험, GS 인증까지의 전체 과정" },
      { type: "검색 솔루션", point: "Elasticsearch 운영·장애 진단, 검색 도메인 깊이 (자동완성·동의어·오타교정)" },
      { type: "공공 SI / 중견", point: "전자정부프레임워크, 공공기관 납품 대응, 문서화·유지보수 능력" },
      { type: "일반 백엔드", point: "Spring Boot, JPA, API 설계, Docker, 대용량 데이터 처리" },
      { type: "풀스택", point: "Next.js + FastAPI 동시 개발 경험, SSE 스트리밍, Atomic Design" },
    ],
    template: `[회사명]의 [제품명 또는 도메인]에 관심을 갖게 된 것은 [구체적 이유]입니다.\n저는 웨어비즈에서 멀티에이전트 RAG 챗봇 플랫폼을 초기 멤버로 개발하며 GS 1등급 인증 취득까지 경험했습니다.\n이 과정에서 [회사 제품·도메인과 연결되는 내 경험을 구체적으로].\n[회사명]에서 [기여하고 싶은 것]을 통해 [성장 방향]을 이루고 싶습니다.`,
  },
};
/* ================================================================
   ▲▲▲  여기까지만 수정  ▲▲▲
   ================================================================ */

function render() {
  const D = DATA;
  document.title = `${D.name} 자기소개서`;

  const sectionsHtml = D.sections.map(s => `
    <div class="section">
      <div class="section-label">${s.label}</div>
      <div class="section-title">${s.title}</div>
      <div class="prose">
        ${s.paragraphs.map(p => `<p>${p}</p>`).join('')}
      </div>
    </div>
  `).join('');

  /* ── Section 05 지원동기 ─ 나만 보는 템플릿, 지원 시마다 별도 작성 ──
  const rowsHtml = D.motivation.rows.map(r => `
    <tr>
      <td><strong>${r.type}</strong></td>
      <td>${r.point}</td>
    </tr>
  `).join('');
  const templateLines = D.motivation.template.split('\n').join('<br>');
  */

  document.body.innerHTML = `
    <div class="page">
      <div class="header">
        <div class="name">${D.name}</div>
        <div class="doc-type">${D.docType}</div>
      </div>
      <div class="body">
        ${sectionsHtml}
        <!-- Section 05 지원동기: 지원 시마다 새로 작성 — DATA.motivation 참고 -->
      </div>
    </div>`;
}
render();
</script>
</body>
</html>
