<html lang="ko">
<head>
  <meta charset="UTF-8">

  <title>임기창 경력기술서</title>
  <style>
    :root {
      --bg: #F9F9F8;
      --page: #FFFFFF;
      --t1: #1C1C1E;
      --t2: #4B5563;
      --t3: #9CA3AF;
      --accent: #4338CA;
      --accent-soft: #EEF2FF;
      --accent-text: #3730A3;
      --tag-bg: #F1F0EC;
      --border: #E8E8E5;
      --green: #065F46;
      --green-bg: #D1FAE5;
      --divider: #F3F4F6;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--t1);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", system-ui, sans-serif;
      font-size: 13.5px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      max-width: 800px;
      margin: 40px auto;
      background: var(--page);
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }
    /* Header */
    .header { padding: 44px 52px 36px; border-bottom: 1px solid var(--border); }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 32px; margin-bottom: 20px; }
    .name { font-size: 2.1rem; font-weight: 800; letter-spacing: -0.04em; line-height: 1; }
    .doc-type { margin-top: 6px; font-size: 0.95rem; color: var(--t2); }
    .contact { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; font-size: 12px; color: var(--t2); flex-shrink: 0; }
    .contact a { color: var(--accent); text-decoration: none; }
    .summary { font-size: 13px; color: var(--t2); line-height: 1.8; max-width: 660px; }
    .summary strong { color: var(--t1); font-weight: 600; }
    /* Body */
    .body { padding: 0 52px 52px; }
    .section { padding-top: 32px; }
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--t3); display: flex; align-items: center; gap: 12px; margin-bottom: 18px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    /* Tech Table */
    .tech-grid { display: grid; grid-template-columns: 100px 1fr; gap: 8px 20px; align-items: start; }
    .tech-cat { font-size: 11.5px; font-weight: 600; color: var(--t2); padding-top: 3px; }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag { background: var(--tag-bg); color: var(--t2); padding: 2px 9px; border-radius: 4px; font-size: 11.5px; }
    /* Company */
    .company-block { margin-bottom: 8px; }
    .company-header { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; }
    .company-name { font-size: 15px; font-weight: 800; }
    .company-period { font-size: 12px; color: var(--t3); white-space: nowrap; flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .company-sub { font-size: 12px; color: var(--t2); margin-top: 2px; }
    /* Project */
    .project { padding: 20px 0; border-top: 1px solid var(--divider); }
    .project:first-of-type { margin-top: 16px; }
    .proj-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 12px; }
    .proj-title { font-size: 14px; font-weight: 700; }
    .proj-period { font-size: 11.5px; color: var(--t3); white-space: nowrap; flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .proj-meta { font-size: 11.5px; color: var(--t3); margin-bottom: 10px; }
    .proj-role { font-size: 12px; color: var(--accent-text); font-weight: 600; background: var(--accent-soft); display: inline-block; padding: 2px 9px; border-radius: 4px; margin-bottom: 8px; }
    .proj-summary { font-size: 12.5px; color: var(--t2); line-height: 1.75; margin-bottom: 14px; }
    /* Sub-label */
    .sub-label { font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--t3); margin-bottom: 7px; }
    .bullets { list-style: none; display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .bullets li { font-size: 12.5px; color: var(--t2); padding-left: 16px; position: relative; line-height: 1.6; }
    .bullets li::before { content: '–'; position: absolute; left: 0; color: var(--t3); }
    /* Problem-solve */
    .ps-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .ps-item { display: grid; grid-template-columns: 90px 1fr; gap: 0 12px; font-size: 12.5px; }
    .ps-label { font-weight: 700; color: var(--t1); }
    .ps-desc { color: var(--t2); line-height: 1.6; }
    /* Outcome */
    .outcome {
      background: var(--green-bg); color: var(--green);
      border-radius: 6px; padding: 10px 14px;
      font-size: 12px; line-height: 1.7; font-weight: 600;
    }
    /* Badge */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--green-bg); color: var(--green);
      font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 100px; margin-top: 8px;
    }
    /* Edu */
    .edu-list { display: flex; flex-direction: column; gap: 10px; }
    .edu-row { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; }
    .edu-name { font-size: 13px; font-weight: 600; }
    .edu-detail { font-size: 12px; color: var(--t2); margin-top: 1px; }
    .edu-period { font-size: 12px; color: var(--t3); white-space: nowrap; flex-shrink: 0; font-variant-numeric: tabular-nums; }
    @media print {
      body { background: white; }
      .page { margin: 0; border: none; border-radius: 0; box-shadow: none; max-width: 100%; }
    }
  </style>
</head>

    { name: "국가평생교육진흥원", detail: "컴퓨터공학 학사 · 재학 중 (2027년 상반기 학위취득 예정)", period: "2025.03 ~" },
    { name: "KH정보교육원",       detail: "BackEnd 개발자 양성과정 수료",                               period: "2021.06 ~ 11." },
  ],
  certifications: [
    { name: "SQL 개발자 (SQLD)", detail: "한국데이터산업진흥원", period: "2024.04" },
    { name: "전산회계 1급",       detail: "한국세무사회",         period: "2022.08" },
  ],
};
/* ================================================================
   ▲▲▲  여기까지만 수정  ▲▲▲
   ================================================================ */

function projectHtml(p) {
  const problemsSection = p.problems.length > 0 ? `
    <div class="sub-label">문제 해결</div>
    <div class="ps-list">
      ${p.problems.map(ps => `
        <div class="ps-item">
          <span class="ps-label">${ps.label}</span>
          <span class="ps-desc">${ps.desc}</span>
        </div>
      `).join('')}
    </div>` : '';

  return `
    <div class="project">
      <div class="proj-header">
        <div class="proj-title">${p.title}</div>
        <span class="proj-period">${p.period}</span>
      </div>
      <div class="proj-meta">${p.tech}</div>
      <div class="proj-role">${p.role}</div>
      <div class="proj-summary">${p.summary}</div>
      <div class="sub-label">담당 업무</div>
      <ul class="bullets">
        ${p.tasks.map(t => `<li>${t}</li>`).join('')}
      </ul>
      ${problemsSection}
      <div class="outcome">성과: ${p.outcome}</div>
    </div>`;
}

function render() {
  const D = DATA;
  document.title = `${D.name} 경력기술서`;

  const skillsHtml = D.skills.map(s => `
    <span class="tech-cat">${s.cat}</span>
    <div class="tags">${s.items.map(i => `<span class="tag">${i}</span>`).join('')}</div>
  `).join('');

  const companiesHtml = D.companies.map(c => `
    <div class="section">
      <div class="section-label">경력</div>
      <div class="company-block">
        <div class="company-header">
          <span class="company-name">${c.name}</span>
          <span class="company-period">${c.period}</span>
        </div>
        <div class="company-sub">${c.sub}</div>
        ${c.badge ? `<div class="badge">${c.badge}</div>` : ''}
      </div>
      ${c.projects.map(projectHtml).join('')}
    </div>
  `).join('');

  const personalHtml = D.personal.map(projectHtml).join('');

  const eduHtml = [...D.education, ...D.certifications].map(e => `
    <div class="edu-row">
      <div>
        <div class="edu-name">${e.name}</div>
        <div class="edu-detail">${e.detail}</div>
      </div>
      <span class="edu-period">${e.period}</span>
    </div>
  `).join('');

  document.body.innerHTML = `
    <div class="page">
      <div class="header">
        <div class="header-top">
          <div>
            <div class="name">${D.name}</div>
            <div class="doc-type">${D.docType}</div>
          </div>
          <div class="contact">
            <span>${D.contact.email}</span>
            <a href="${D.contact.github.url}">${D.contact.github.label}</a>
            <a href="${D.contact.portfolio.url}">${D.contact.portfolio.label}</a>
          </div>
        </div>
        <p class="summary">${D.summary}</p>
      </div>
      <div class="body">
        <div class="section">
          <div class="section-label">보유 기술</div>
          <div class="tech-grid">${skillsHtml}</div>
        </div>
        ${companiesHtml}
        <div class="section">
          <div class="section-label">개인 프로젝트</div>
          ${personalHtml}
        </div>
        <div class="section">
          <div class="section-label">학력 · 자격</div>
          <div class="edu-list">${eduHtml}</div>
        </div>
      </div>
    </div>`;
}
render();
</script>
</body>
</html>
