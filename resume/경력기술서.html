<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>임기창 경력기술서</title>
  <style>
    :root {
      --bg: #F2F2F0;
      --page: #FFFFFF;
      --t1: #0F0F0F;
      --t2: #4B5563;
      --t3: #9CA3AF;
      --accent: #3730A3;
      --accent-soft: #EEF2FF;
      --accent-text: #3730A3;
      --tag-bg: #FAFAF9;
      --tag-border: #D9D9D4;
      --border: #E5E7EB;
      --divider: #F3F4F6;
      --green: #065F46;
      --green-bg: #D1FAE5;
      --amber: #92400E;
      --amber-bg: #FEF3C7;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--t1);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      max-width: 820px;
      margin: 36px auto;
      background: var(--page);
      border-radius: 4px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    /* ── HEADER ── */
    .header { padding: 40px 52px 32px; border-bottom: 1px solid var(--border); }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 28px; margin-bottom: 18px; }
    .name { font-size: 2rem; font-weight: 800; letter-spacing: -0.04em; line-height: 1; margin-bottom: 4px; }
    .doc-type { font-size: 0.88rem; color: var(--t2); }
    .contact { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; font-size: 11.5px; color: var(--t2); flex-shrink: 0; }
    .contact a { color: var(--t2); text-decoration: none; }
    .summary { font-size: 13px; color: var(--t2); line-height: 1.8; border-left: 2px solid var(--border); padding-left: 14px; }
    .summary strong { color: var(--t1); font-weight: 600; }

    /* ── BODY ── */
    .body { padding: 0 52px 52px; }
    .section { padding-top: 28px; }
    .section-label {
      font-size: 11px; font-weight: 800;
      color: var(--t1);
      border-bottom: 1.5px solid var(--t1);
      padding-bottom: 6px;
      margin-bottom: 14px;
      letter-spacing: 0.01em;
    }

    /* ── SKILLS ── */
    .tech-grid { display: grid; grid-template-columns: 100px 1fr; gap: 7px 16px; align-items: start; }
    .tech-cat { font-size: 11px; font-weight: 600; color: var(--t2); padding-top: 3px; }
    .tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag { background: var(--tag-bg); color: #1F2937; border: 1px solid var(--tag-border); padding: 2px 8px; border-radius: 4px; font-size: 11px; }
    .cl { font-size: 10px; font-weight: 700; color: var(--t3); letter-spacing: 0.04em; margin-right: 5px; }

    /* ── COMPANY ── */
    .company-block { margin-bottom: 4px; }
    .company-header { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; }
    .company-name { font-size: 15px; font-weight: 800; }
    .company-period { font-size: 11.5px; color: var(--t3); white-space: nowrap; flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .company-sub { font-size: 12px; color: var(--t2); margin-top: 2px; }
    .badge {
      display: inline-block;
      background: #F5F4F0; color: #555;
      font-size: 10.5px; font-weight: 600;
      padding: 3px 9px; border-radius: 3px; margin-top: 7px;
      border: 1px solid #E0DDD8;
    }

    /* ── PROJECT ── */
    .project { padding: 18px 0; border-top: 1px solid var(--divider); }
    .project:first-of-type { margin-top: 14px; }
    .proj-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 10px; }
    .proj-title { font-size: 14px; font-weight: 700; }
    .proj-period { font-size: 11px; color: var(--t3); white-space: nowrap; flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .proj-meta { font-size: 11px; color: var(--t3); margin-bottom: 8px; }
    .proj-role {
      font-size: 11.5px; color: var(--t2); font-weight: 600;
      display: inline-block; margin-bottom: 8px;
    }
    .proj-summary { font-size: 12.5px; color: var(--t2); line-height: 1.75; margin-bottom: 14px; }

    /* ── SUB-SECTIONS ── */
    .sub-label {
      font-size: 10.5px; font-weight: 700;
      color: var(--t3); margin-bottom: 7px;
      letter-spacing: 0.03em;
    }
    .bullets { list-style: none; display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
    .bullets li { font-size: 12px; color: var(--t2); padding-left: 14px; position: relative; line-height: 1.65; }
    .bullets li::before { content:'–'; position: absolute; left: 0; color: var(--t3); }
    .bullets li strong { color: var(--t1); font-weight: 600; }

    /* ── PROBLEM-SOLVE ── */
    .ps-list { display: flex; flex-direction: column; gap: 9px; margin-bottom: 14px; }
    .ps-item { display: grid; grid-template-columns: 96px 1fr; gap: 0 12px; font-size: 12px; }
    .ps-label { font-weight: 700; color: var(--t1); line-height: 1.6; }
    .ps-desc { color: var(--t2); line-height: 1.65; }

    /* ── OUTCOME ── */
    .outcome {
      color: var(--t2);
      font-size: 12px; line-height: 1.7;
      padding: 9px 13px;
      background: #F8F8F5;
      border-left: 2px solid #CCCAC4;
      border-radius: 0 3px 3px 0;
    }

    /* ── EDU ── */
    .edu-list { display: flex; flex-direction: column; gap: 10px; }
    .edu-row { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; }
    .edu-name { font-size: 12.5px; font-weight: 600; }
    .edu-detail { font-size: 11.5px; color: var(--t2); margin-top: 1px; }
    .edu-period { font-size: 11px; color: var(--t3); white-space: nowrap; flex-shrink: 0; font-variant-numeric: tabular-nums; }

    @media print {
      body { background: white; }
      .page { margin: 0; border: none; border-radius: 0; box-shadow: none; max-width: 100%; }
      .project { page-break-inside: avoid; }
    }
  </style>
</head>

function projectHtml(p) {
  const problemsSection = p.problems.length > 0 ? `
    <div class="sub-label">문제 해결</div>
    <div class="ps-list">
      ${p.problems.map(ps => `
        <div class="ps-item">
          <span class="ps-label">${ps.label}</span>
          <span class="ps-desc">${ps.desc}</span>
        </div>`).join('')}
    </div>` : '';

  return `
    <div class="project">
      <div class="proj-header">
        <div class="proj-title">${p.title}</div>
        <span class="proj-period">${p.period}</span>
      </div>
      <div class="proj-meta">${p.tech}</div>
      <span class="proj-role">${p.role}</span>
      <div class="proj-summary">${p.summary}</div>
      <div class="sub-label">담당 업무</div>
      <ul class="bullets">
        ${p.tasks.map(t => `<li>${t}</li>`).join('')}
      </ul>
      ${problemsSection}
      <div class="outcome">성과 &nbsp;—&nbsp; ${p.outcome}</div>
    </div>`;
}

function render() {
  const D = DATA;
  document.title = `${D.name} 경력기술서`;

  const skillsHtml = D.skills.map(s => `
    <span class="tech-cat">${s.cat}</span>
    <div class="tags">${s.items.map(i => `<span class="tag">${i}</span>`).join('')}</div>`
  ).join('');

  const companiesHtml = D.companies.map(c => `
    <div class="section">
      <div class="section-label">경력</div>
      <div class="company-block">
        <div class="company-header">
          <span class="company-name">${c.name}</span>
          <span class="company-period">${c.period}</span>
        </div>
        <div class="company-sub">${c.sub}</div>
        ${c.badge ? `<div class="badge">${c.badge}</div>` : ''}
      </div>
      ${c.projects.map(projectHtml).join('')}
    </div>`).join('');

  const personalHtml = D.personal.map(projectHtml).join('');

  const eduHtml = D.education.map(e => `
    <div class="edu-row">
      <div>
        <div class="edu-name">${e.name}</div>
        <div class="edu-detail">${e.detail}</div>
      </div>
      <span class="edu-period">${e.period}</span>
    </div>`).join('');

  const certHtml = D.certifications.map(e => `
    <div class="edu-row">
      <div>
        <div class="edu-name">${e.name}</div>
        <div class="edu-detail">${e.detail}</div>
      </div>
      <span class="edu-period">${e.period}</span>
    </div>`).join('');

  document.body.innerHTML = `
    <div class="page">
      <div class="header">
        <div class="header-top">
          <div>
            <div class="name">${D.name}</div>
            <div class="doc-type">${D.docType}</div>
          </div>
          <div class="contact">
            <span><span class="cl">이메일</span>${D.contact.email}</span>
            <span><span class="cl">전화</span>${D.contact.phone}</span>
            <a href="${D.contact.github.url}"><span class="cl">GitHub</span>${D.contact.github.label}</a>
            <a href="${D.contact.portfolio.url}"><span class="cl">포트폴리오</span>${D.contact.portfolio.label}</a>
          </div>
        </div>
        <p class="summary">${D.summary}</p>
      </div>
      <div class="body">
        <div class="section">
          <div class="section-label">기술 스택</div>
          <div class="tech-grid">${skillsHtml}</div>
        </div>
        ${companiesHtml}
        <div class="section">
          <div class="section-label">개인 프로젝트</div>
          ${personalHtml}
        </div>
        <div class="section">
          <div class="section-label">학력 · 교육</div>
          <div class="edu-list">${eduHtml}</div>
        </div>
        <div class="section">
          <div class="section-label">자격증</div>
          <div class="edu-list">${certHtml}</div>
        </div>
      </div>
    </div>`;
}
render();
