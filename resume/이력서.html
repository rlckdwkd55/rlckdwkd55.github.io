<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>임기창 이력서</title>
  <style>
    :root {
      --bg: #F2F2F0;
      --page: #FFFFFF;
      --t1: #0F0F0F;
      --t2: #4B5563;
      --t3: #9CA3AF;
      --accent: #3730A3;
      --accent-soft: #EEF2FF;
      --accent-text: #3730A3;
      --accent-border: #C7D2FE;
      --tag-bg: #FAFAF9;
      --tag-border: #D9D9D4;
      --border: #E5E7EB;
      --divider: #F3F4F6;
      --green: #065F46;
      --green-bg: #D1FAE5;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--t1);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      max-width: 820px;
      margin: 36px auto;
      background: var(--page);
      border-radius: 4px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    /* ── HEADER ── */
    .header { padding: 40px 52px 32px; border-bottom: 1px solid var(--border); }
    .header-layout { display: flex; gap: 28px; align-items: flex-start; margin-bottom: 22px; }
    .photo {
      width: 90px; height: 90px;
      border-radius: 10px;
      object-fit: cover; object-position: center top;
      flex-shrink: 0;
      border: 1px solid var(--border);
      display: block;
    }
    .photo-fallback {
      width: 90px; height: 90px;
      border-radius: 10px;
      background: #F3F4F6;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-info { flex: 1; }
    .name { font-size: 2rem; font-weight: 800; letter-spacing: -0.04em; line-height: 1; margin-bottom: 5px; }
    .job-title { font-size: 0.88rem; color: var(--t2); margin-bottom: 12px; }
    .contact-row { display: flex; flex-wrap: wrap; column-gap: 16px; row-gap: 4px; font-size: 11.5px; color: var(--t2); }
    .contact-row a { color: var(--t2); text-decoration: none; }
    .cl { font-size: 10px; font-weight: 700; color: var(--t3); letter-spacing: 0.04em; margin-right: 5px; }
    .summary {
      font-size: 13px; color: var(--t2); line-height: 1.8;
      border-left: 2px solid var(--border);
      padding-left: 14px;
    }
    .summary strong { color: var(--t1); font-weight: 600; }

    /* ── HIGHLIGHTS ── */
    .highlights {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .hl-item {
      flex: 1;
      padding: 16px 20px;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .hl-item:last-child { border-right: none; }
    .hl-bar { width: 20px; height: 2px; background: var(--t1); margin: 0 auto 8px; }
    .hl-title { font-size: 12px; font-weight: 700; color: var(--t1); }

    /* ── BODY ── */
    .body { padding: 0 52px 48px; }
    .section { padding-top: 26px; }
    .section-label {
      font-size: 11px; font-weight: 800;
      color: var(--t1);
      border-bottom: 1.5px solid var(--t1);
      padding-bottom: 6px;
      margin-bottom: 14px;
      letter-spacing: 0.01em;
    }

    /* ── SKILLS ── */
    .tech-grid { display: grid; grid-template-columns: 82px 1fr; gap: 8px 16px; align-items: start; }
    .tech-cat { font-size: 11px; font-weight: 600; color: var(--t2); padding-top: 3px; }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag {
      background: var(--tag-bg);
      color: #1F2937;
      border: 1px solid var(--tag-border);
      padding: 2px 9px;
      border-radius: 4px;
      font-size: 11px;
    }

    /* ── CAREER ── */
    .career-item { margin-bottom: 26px; }
    .career-item:last-child { margin-bottom: 0; }
    .career-header { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 2px; }
    .company { font-size: 14px; font-weight: 700; }
    .period { font-size: 11px; color: var(--t3); white-space: nowrap; flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .position { font-size: 11.5px; color: var(--t2); margin-bottom: 12px; }

    /* 프로젝트 서브리스트 */
    .proj-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .proj-entry {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 8px 10px;
      background: #FAFAF8;
      border-radius: 4px;
      border-left: 2px solid #DDDBD6;
    }
    .proj-entry-name { font-size: 12px; font-weight: 700; color: var(--t1); margin-bottom: 2px; }
    .proj-entry-desc { font-size: 11.5px; color: var(--t2); line-height: 1.55; }
    .proj-entry-period { font-size: 10.5px; color: var(--t3); white-space: nowrap; flex-shrink: 0; padding-top: 1px; }

    .sub-label { font-size: 10.5px; font-weight: 700; color: var(--t3); margin-bottom: 7px; letter-spacing: 0.03em; }
    .bullets { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .bullets li { font-size: 12px; color: var(--t2); padding-left: 14px; position: relative; line-height: 1.65; }
    .bullets li::before { content:'–'; position: absolute; left: 0; color: var(--t3); }
    .bullets li strong { color: var(--t1); font-weight: 600; }
    .badge {
      display: inline-block;
      background: #F5F4F0; color: #555;
      font-size: 10.5px; font-weight: 600;
      padding: 3px 9px; border-radius: 3px; margin-top: 8px;
      border: 1px solid #E0DDD8;
    }

    /* ── 개인 프로젝트 ── */
    .proj-row { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; margin-bottom: 2px; }
    .proj-name { font-size: 12.5px; font-weight: 700; }
    .proj-period-sm { font-size: 11px; color: var(--t3); white-space: nowrap; flex-shrink: 0; }
    .proj-meta { font-size: 11px; color: var(--t3); margin-bottom: 4px; }
    .proj-desc { font-size: 12px; color: var(--t2); line-height: 1.65; }

    /* ── EDU ── */
    .edu-list { display: flex; flex-direction: column; gap: 10px; }
    .edu-row { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; }
    .edu-name { font-size: 12.5px; font-weight: 600; }
    .edu-detail { font-size: 11.5px; color: var(--t2); margin-top: 1px; }
    .edu-period { font-size: 11px; color: var(--t3); white-space: nowrap; flex-shrink: 0; font-variant-numeric: tabular-nums; }

    @media print {
      body { background: white; }
      .page { margin: 0; border: none; border-radius: 0; box-shadow: none; max-width: 100%; }
    }
  </style>
</head>
<body>

/* ================================================================
   ▲▲▲  여기까지만 수정  ▲▲▲
   ================================================================ */

function render() {
  const D = DATA;
  document.title = `${D.name} 이력서`;

  const photoHtml = `<img class="photo" src="${D.photo}" alt="${D.name} 프로필 사진"

    `<div class="hl-item"><div class="hl-bar"></div><div class="hl-title">${t}</div></div>`
  ).join('');

  const skillsHtml = D.skills.map(s => `
    <span class="tech-cat">${s.cat}</span>
    <div class="tags">${s.items.map(item =>
      `<span class="tag">${item}</span>`
    ).join('')}</div>`).join('');

  const careerHtml = D.career.map(c => {
    const projHtml = c.projects.map(p => `
      <div class="proj-entry">
        <div>
          <div class="proj-entry-name">${p.name}</div>
          <div class="proj-entry-desc">${p.desc}</div>
        </div>
        <div class="proj-entry-period">${p.period}</div>
      </div>`).join('');

    return `
      <div class="career-item">
        <div class="career-header">
          <span class="company">${c.company}</span>
          <span class="period">${c.period}</span>
        </div>
        <div class="position">${c.position}</div>
        <div class="sub-label">담당 프로젝트</div>
        <div class="proj-list">${projHtml}</div>
        <div class="sub-label">주요 업무</div>
        <ul class="bullets">
          ${c.bullets.map(b => `<li>${b}</li>`).join('')}
        </ul>
        ${c.badge ? `<div class="badge">${c.badge}</div>` : ''}
      </div>`;
  }).join('');

  const p = D.project;
  const projectHtml = `
    <div class="proj-row">
      <span class="proj-name">${p.name}</span>
      <span class="proj-period-sm">${p.period}</span>
    </div>
    <div class="proj-meta">${p.meta}</div>
    <div class="proj-desc">${p.desc}</div>`;

  const eduHtml = D.education.map(e => `
    <div class="edu-row">
      <div>
        <div class="edu-name">${e.name}</div>
        <div class="edu-detail">${e.detail}</div>
      </div>
      <span class="edu-period">${e.period}</span>
    </div>`).join('');

  const certHtml = D.certifications.map(e => `
    <div class="edu-row">
      <div>
        <div class="edu-name">${e.name}</div>
        <div class="edu-detail">${e.detail}</div>
      </div>
      <span class="edu-period">${e.period}</span>
    </div>`).join('');

  document.body.innerHTML = `
    <div class="page">
      <div class="header">
        <div class="header-layout">
          ${photoHtml}
          <div class="header-info">
            <div class="name">${D.name}</div>
            <div class="job-title">${D.title}</div>
            <div class="contact-row">
              <span><span class="cl">이메일</span>${D.contact.email}</span>
              <span><span class="cl">전화</span>${D.contact.phone}</span>
              <span><span class="cl">위치</span>${D.contact.location}</span>
              <a href="${D.contact.github.url}"><span class="cl">GitHub</span>${D.contact.github.label}</a>
              <a href="${D.contact.portfolio.url}"><span class="cl">포트폴리오</span>${D.contact.portfolio.label}</a>
            </div>
          </div>
        </div>
        <p class="summary">${D.summary}</p>
      </div>

      <div class="highlights">${highlightsHtml}</div>

      <div class="body">
        <div class="section">
          <div class="section-label">기술 스택</div>
          <div class="tech-grid">${skillsHtml}</div>
        </div>
        <div class="section">
          <div class="section-label">경력</div>
          ${careerHtml}
        </div>
        <div class="section">
          <div class="section-label">개인 프로젝트</div>
          ${projectHtml}
        </div>
        <div class="section">
          <div class="section-label">학력 · 교육</div>
          <div class="edu-list">${eduHtml}</div>
        </div>
        <div class="section">
          <div class="section-label">자격증</div>
          <div class="edu-list">${certHtml}</div>
        </div>
      </div>
    </div>`;
}
render();

</body>
</html>
