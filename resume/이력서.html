<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>임기창 이력서</title>
  <style>
    /* ── 토큰 ── */
    :root {
      --bg: #F9F9F8;
      --page: #FFFFFF;
      --t1: #1C1C1E;
      --t2: #4B5563;
      --t3: #9CA3AF;
      --accent: #4338CA;
      --accent-soft: #EEF2FF;
      --accent-text: #3730A3;
      --tag-bg: #F1F0EC;
      --border: #E8E8E5;
      --green: #065F46;
      --green-bg: #D1FAE5;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--t1);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", system-ui, sans-serif;
      font-size: 13.5px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      max-width: 800px;
      margin: 40px auto;
      background: var(--page);
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }
    /* Header */
    .header { padding: 44px 52px 36px; border-bottom: 1px solid var(--border); }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 32px; margin-bottom: 20px; }
    .name { font-size: 2.1rem; font-weight: 800; letter-spacing: -0.04em; line-height: 1; }
    .job-title { margin-top: 6px; font-size: 0.95rem; color: var(--t2); font-weight: 400; }
    .contact { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; font-size: 12px; color: var(--t2); flex-shrink: 0; }
    .contact a { color: var(--accent); text-decoration: none; }
    .summary { font-size: 13px; color: var(--t2); line-height: 1.75; max-width: 660px; }
    .summary strong { color: var(--t1); font-weight: 600; }
    /* Body */
    .body { padding: 0 52px 52px; }
    .section { padding-top: 32px; }
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--t3); display: flex; align-items: center; gap: 12px; margin-bottom: 18px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    /* Tech */
    .tech-grid { display: grid; grid-template-columns: 80px 1fr; gap: 8px 20px; align-items: start; }
    .tech-cat { font-size: 11.5px; font-weight: 600; color: var(--t2); padding-top: 3px; }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag { background: var(--tag-bg); color: var(--t2); padding: 2px 9px; border-radius: 4px; font-size: 11.5px; }
    .tag.primary { background: var(--accent-soft); color: var(--accent-text); font-weight: 600; }
    /* Career */
    .career-item { margin-bottom: 24px; }
    .career-item:last-child { margin-bottom: 0; }
    .career-header { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; }
    .company { font-size: 14.5px; font-weight: 700; }
    .period { font-size: 11.5px; color: var(--t3); white-space: nowrap; flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .position { font-size: 12px; color: var(--t2); margin: 3px 0 10px; }
    .bullets { list-style: none; display: flex; flex-direction: column; gap: 5px; }
    .bullets li { font-size: 12.5px; color: var(--t2); padding-left: 16px; position: relative; line-height: 1.6; }
    .bullets li::before { content: '–'; position: absolute; left: 0; color: var(--t3); }
    .bullets li.key { color: var(--accent-text); font-weight: 600; }
    .bullets li.key::before { color: var(--accent); }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--green-bg); color: var(--green);
      font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 100px; margin-top: 8px;
    }
    /* Project */
    .project-name { font-weight: 700; font-size: 13.5px; }
    .project-meta { font-size: 11.5px; color: var(--t3); margin: 2px 0 5px; }
    .project-desc { font-size: 12.5px; color: var(--t2); line-height: 1.65; }
    /* Edu */
    .edu-list { display: flex; flex-direction: column; gap: 10px; }
    .edu-row { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; }
    .edu-name { font-size: 13px; font-weight: 600; }
    .edu-detail { font-size: 12px; color: var(--t2); margin-top: 1px; }
    .edu-period { font-size: 12px; color: var(--t3); white-space: nowrap; flex-shrink: 0; font-variant-numeric: tabular-nums; }
    /* Print */
    @media print {
      body { background: white; }
      .page { margin: 0; border: none; border-radius: 0; box-shadow: none; max-width: 100%; }
    }
  </style>
</head>
<body>

/* ================================================================
   ▲▲▲  여기까지만 수정  ▲▲▲

function render() {
  const D = DATA;
  document.title = `${D.name} 이력서`;
  document.body.innerHTML = `
    <div class="page">
      <div class="header">

        </div>
        <div class="section">

            <div class="career-item">

                <span class="period">${c.period}</span>
              </div>
              <div class="position">${c.position}</div>
              <ul class="bullets">
                ${c.bullets.map(b => `<li class="${b.key ? 'key' : ''}">${b.text}</li>`).join('')}

              ${c.badge ? `<div class="badge">${c.badge}</div>` : ''}

        </div>
        <div class="section">
          <div class="section-label">개인 프로젝트</div>

            <div>
              <div class="project-name">${p.name}</div>

              <div class="project-desc">${p.desc}</div>

          `).join('')}
        </div>
        <div class="section">
          <div class="section-label">학력 · 자격</div>
          <div class="edu-list">
            ${[...D.education, ...D.certifications].map(e => `
              <div class="edu-row">
                <div>
                  <div class="edu-name">${e.name}</div>
                  <div class="edu-detail">${e.detail}</div>
                </div>
                <span class="edu-period">${e.period}</span>

</body>
</html>
