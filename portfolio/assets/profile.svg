<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#e879f9"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b21b6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>

  <!-- Body silhouette -->
  <ellipse cx="200" cy="340" rx="95" ry="70" fill="url(#body)" clip-path="url(#circle)"/>

  <!-- Head -->
  <circle cx="200" cy="168" r="68" fill="url(#body)"/>

  <!-- Text label -->
  <text x="200" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.55)" letter-spacing="2">PHOTO HERE</text>
</svg>
